name: Build iOS IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Prepare Web Assets
        run: |
          # Đảm bảo thư mục web tồn tại để Capacitor không báo lỗi
          mkdir -p www 

      - name: Add iOS Platform
        run: npx cap add ios || true

      - name: Sync Web Code
        run: npx cap sync ios
        
      # ĐÃ XÓA bước "Install CocoaPods Dependencies"

      - name: Build Xcode Project
        run: |
          # SỬA: Đổi từ -workspace sang -project vì SPM không dùng workspace
          xcodebuild -project ios/App/App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Debug-iphoneos/*.app Payload/
          zip -r MyWebApp.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 7-Signed-IPA
          path: MusicB.ipa
