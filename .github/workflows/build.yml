name: Build iOS IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      # BƯỚC ĐÃ SỬA: Bỏ "npm run build" vì bạn dùng HTML thuần.
      # Chỉ cần đảm bảo thư mục chứa code web của bạn (ví dụ: 'www' hoặc 'dist') đã sẵn sàng.
      - name: Prepare Web Assets
        run: |
          # Nếu thư mục output của bạn chưa có, Capacitor sẽ báo lỗi.
          # Lệnh này đảm bảo thư mục luôn tồn tại.
          mkdir -p www 

      - name: Add iOS Platform
        run: npx cap add ios || true # Thêm "|| true" để không bị lỗi nếu platform đã tồn tại

      - name: Sync Web Code
        run: npx cap sync ios
        
      - name: Install CocoaPods Dependencies
        run: |
          cd ios/App
          pod install

      - name: Build Xcode Project
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Debug-iphoneos/*.app Payload/
          zip -r MyWebApp.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-Signed-IPA
          path: MyWebApp.ipa
