name: Build iOS IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      # 1. Bổ sung bước Build Web (Tùy thuộc vào framework bạn dùng: React/Vue/Ionic...)
      - name: Build Web Assets
        run: npm run build 

      # 2. Thêm nền tảng iOS (Chỉ hoạt động nếu thư mục ios chưa được commit lên Git)
      - name: Add iOS Platform
        run: npx cap add ios

      # 3. Đồng bộ code web sang thư mục native
      - name: Sync Web Code
        run: npx cap sync ios
        
      # 4. BỔ SUNG QUAN TRỌNG: Cài đặt Pods tường minh để tạo file .xcworkspace
      - name: Install CocoaPods Dependencies
        run: |
          cd ios/App
          pod install

      - name: Build Xcode Project
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Debug-iphoneos/*.app Payload/
          zip -r MyWebApp.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-Signed-IPA
          path: MyWebApp.ipa
